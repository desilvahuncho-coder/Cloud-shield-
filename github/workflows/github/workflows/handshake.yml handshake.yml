name: CloudShield Handshake Engine

on:
  workflow_dispatch: # Allows you to trigger this handshake manually with a button
  schedule:
    - cron: '0 * * * *' # Automatically runs once every hour to keep data fresh

jobs:
  run-handshake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Source
        uses: actions/checkout@v3

      - name: Set Up Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Secure Cloud Dependencies
        run: |
          pip install azure-identity azure-mgmt-compute azure-mgmt-consumption

      - name: Execute Handshake Authentication
        env:
          # Pulls the live API tokens securely out of your vault settings
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: python auth_bridge.py

      - name: Commit and Update Live Dashboard Status
        run: |
          git config --global user.name "CloudShield Robot"
          git config --global user.email "robot@cloudshield.internal"
          git add data.json
          git commit -m "Sync live authentication handshake status [skip ci]" || exit 0
          git push
