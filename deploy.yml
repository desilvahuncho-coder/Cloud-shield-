name: Deploy CloudShield Hub

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Validation Framework
        run: |
          pip install flask flask-cors

      - name: Verification Smoke Test
        run: |
          python -c "import flask; print('[INTEGRITY] App dependency validation clean.')"

  deploy-frontend:
    needs: validate-and-test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup GitHub Pages Asset Delivery
        uses: actions/configure-pages@v4

      - name: Upload Static Pages Production Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Serves your root folder containing index.html

      - name: Deploy Live Link to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
